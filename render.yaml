services:
  - type: web
    name: gasket-match
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python nameplate_web_app.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_VARIANT_GASKET_45
        sync: false
      - key: SHOPIFY_VARIANT_GASKET_68
        sync: false
      - key: SHOPIFY_VARIANT_GASKET_90
        sync: false
      - key: SHOPIFY_VARIANT_GASKET_120
        sync: false
  - type: cron
    name: gasket-data-pipeline
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python data_pipeline_worker.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: GOOGLE_CSE_KEY
        sync: false
      - key: GOOGLE_CSE_CX
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RESEARCH_API_KEY
        sync: false
  - type: cron
    name: comprehensive-product-backfill
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python comprehensive_backfill_worker.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: GOOGLE_CSE_KEY
        sync: false
      - key: GOOGLE_CSE_CX
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RESEARCH_API_KEY
        sync: false
      - key: OPENAI_PRODUCT_RESEARCH_MODEL
        value: gpt-4.1
      - key: COMPREHENSIVE_BACKFILL_LIMIT
        value: "25"
      - key: COMPREHENSIVE_BACKFILL_MAX_AI
        value: "8"
      - key: COMPREHENSIVE_BACKFILL_SLEEP_SECONDS
        value: "1.5"
  - type: cron
    name: daily-database-digest
    runtime: python
    schedule: "0 8 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_database_digest.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DIGEST_EMAIL_TO
        sync: false
      - key: DIGEST_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
