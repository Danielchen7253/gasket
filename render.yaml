services:
  - type: web
    name: gasket-match
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python nameplate_web_app.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
  - type: cron
    name: gasket-market-discovery
    runtime: python
    schedule: "*/20 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python market_discovery_crawler.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
  - type: cron
    name: gasket-product-images
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python product_image_search_crawler.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
  - type: cron
    name: gasket-enrichment
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python gasket_enrichment_crawler.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
