services:
  - type: web
    name: fixpro24-gasket-match
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python nameplate_web_app.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
